<div class="screen">
  <div class="site-header">
    <span class="site-name">🧱 Camberbrick Green</span>
  </div>

  <div class="breadcrumb">
    <a href="/">Home</a>
    <span class="breadcrumb-sep">›</span>
    <span class="breadcrumb-current">{{ name or part_id }}</span>
  </div>

  <div class="part-hero">
    {% if img_url %}
    <img class="part-hero-img" src="{{ img_url }}" alt="{{ name }}">
    {% else %}
    <div class="part-hero-img-fallback">🧱</div>
    {% endif %}
    <div class="part-number">Part #{{ part_id }}</div>
    <div class="part-title">{{ name }}</div>
    {% if category %}
    <div class="part-category-line">{{ category }}</div>
    {% endif %}
  </div>

  <div class="status-section">
    <div class="status-badge new">⊕ Not in your collection</div>
    <div class="status-note">Add it to record where to store it</div>
  </div>

  <div class="add-form-section">
    <form hx-post="/add-part"
          hx-target=".shell"
          hx-swap="innerHTML"
          hx-indicator="#add-spinner">
      <input type="hidden" name="part_id"  value="{{ part_id }}">
      <input type="hidden" name="name"     value="{{ name }}">
      <input type="hidden" name="img_url"  value="{{ img_url or '' }}">
      <input type="hidden" name="category" value="{{ category or '' }}">

      <label class="field-label" for="location">Storage location</label>
      {% if storage_types %}
      <select class="field-input" id="location" name="location" required>
        <option value="" disabled selected>Choose storage…</option>
        {% for st in storage_types %}
        <option value="{{ st.name }}">{{ st.name }}</option>
        {% endfor %}
      </select>
      {% else %}
      <input class="field-input" id="location" name="location"
             type="text" placeholder="e.g. Akro-Mils large"
             autocomplete="off" required autofocus>
      {% endif %}

      <button type="submit" class="btn-primary">Add to collection</button>
    </form>

    <div id="add-spinner" class="loading-center htmx-indicator">
      <div class="spinner"></div>
      <p class="loading-text">Saving…</p>
    </div>

    <a href="/" class="btn-ghost">Skip</a>
  </div>
</div>
