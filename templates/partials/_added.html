<div class="screen">
  <div class="site-header">
    <span class="site-name">🧱 Camberbrick</span>
  </div>

  <div class="breadcrumb">
    <a href="/">Home</a>
    <span class="breadcrumb-sep">›</span>
    <span class="breadcrumb-current">Added</span>
  </div>

  <div class="confirmation-section">
    <div class="confirmation-check">✓</div>
    <div class="confirmation-label">Added to collection</div>
    <div class="confirmation-code">{{ location }}</div>
    <div class="confirmation-name">{{ name }}</div>
  </div>

  <div class="actions-section">
    <a href="/" class="btn-primary">Scan another piece</a>
    <a href="/library" class="btn-secondary">Browse library</a>
  </div>
</div>
