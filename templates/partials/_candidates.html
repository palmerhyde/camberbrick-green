<div class="screen">
  <div class="site-header">
    <span class="site-name">🧱 Camberbrick Green</span>
  </div>

  <div class="breadcrumb">
    <a href="/">Home</a>
    <span class="breadcrumb-sep">›</span>
    <span class="breadcrumb-current">Identify piece</span>
  </div>

  <div class="page-header">
    <div class="page-title">Which piece is this?</div>
    <div class="page-subtitle">Tap the best match</div>
  </div>

  <div class="candidate-list">
    {% for item in items %}
    <form hx-post="/lookup"
          hx-target=".shell"
          hx-swap="innerHTML"
          hx-indicator="#spinner">
      <input type="hidden" name="part_id" value="{{ item.id }}">
      <input type="hidden" name="name"    value="{{ item.name or '' }}">
      <input type="hidden" name="img_url" value="{{ item.img_url or '' }}">
      <button type="submit" class="candidate-card">
        {% if item.img_url %}
        <img class="candidate-img" src="{{ item.img_url }}" alt="{{ item.name }}" loading="lazy">
        {% else %}
        <div class="candidate-img-fallback">🧱</div>
        {% endif %}
        <div class="candidate-info">
          <div class="candidate-part-num">#{{ item.id }}</div>
          <div class="candidate-name">{{ item.name or item.id }}</div>
          {% if item.score is defined and item.score %}
          <div class="candidate-score">{{ (item.score * 100) | round | int }}% match</div>
          {% endif %}
        </div>
        <span class="candidate-chevron">›</span>
      </button>
    </form>
    {% endfor %}
  </div>

  <div id="spinner" class="loading-center htmx-indicator">
    <div class="spinner"></div>
    <p class="loading-text">Checking your collection…</p>
  </div>

  <div class="actions-section">
    <a href="/" class="btn-ghost">None of these — try again</a>
  </div>
</div>
