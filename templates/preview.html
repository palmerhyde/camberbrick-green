<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Camberbrick Green</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="shell">
    <div class="screen">

      <div class="error-banner" style="font-size:12px; margin-bottom:1rem;">
        ⚠️ Preview mode — UI only. For full functionality run:
        <code style="display:block; margin-top:4px; font-size:11px;">
          .venv/bin/uvicorn main:app --reload --host 0.0.0.0 --port 8000
        </code>
      </div>

      <header class="header">
        <span class="header-icon">🧱</span>
        <h1 class="header-title">Camberbrick Green</h1>
      </header>

      <div class="upload-zone">
        <div class="upload-icon">📷</div>
        <p class="upload-primary">Tap to photograph a piece</p>
        <p class="upload-secondary">Point camera at the LEGO part</p>
      </div>

      <div class="divider-row">
        <span class="divider-line"></span>
        <span class="divider-text">or</span>
        <span class="divider-line"></span>
      </div>

      <div class="manual-row">
        <input class="manual-input" type="text" placeholder="e.g. 3001">
        <button class="manual-btn">Look up</button>
      </div>

      <a href="#" class="link-btn">Browse your library</a>

    </div>
  </div>
</body>
</html>
